<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q‑chat · Splash</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at center, #0b0e1a, #03050c);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .splash {
      text-align: center;
      animation: floatGlow 1.8s ease-in-out infinite;
    }

    .logo {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      width: 100px;
      height: 100px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.2rem;
      font-weight: 800;
      margin: 0 auto 24px;
      box-shadow: 0 25px 35px -12px rgba(79, 70, 229, 0.5);
      color: white;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(120deg, #fff, #c4b5fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -1px;
    }

    .tagline {
      color: #a5b4fc;
      margin: 12px 0 32px;
      font-size: 1rem;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(139, 92, 246, 0.3);
      border-top: 3px solid #8b5cf6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes floatGlow {
      0% { transform: translateY(0); filter: drop-shadow(0 0 2px rgba(139,92,246,0.3));}
      50% { transform: translateY(-10px); filter: drop-shadow(0 0 15px rgba(139,92,246,0.6));}
      100% { transform: translateY(0); filter: drop-shadow(0 0 2px rgba(139,92,246,0.3));}
    }
  </style>
</head>
<body>
<div class="splash">
  <div class="logo">Q</div>
  <h1>Q‑chat</h1>
  <div class="tagline">where connections pulse</div>
  <div class="loader"></div>
</div>

<script>
  // Redirect to auth page after 1.8 seconds
  setTimeout(() => {
    window.location.href = 'auth.html';
  }, 1800);
</script>
</body>
</html>
