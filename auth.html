<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q‑chat · Join the pulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0c1a, #020617);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .auth-card {
      background: rgba(18, 22, 40, 0.8);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(91, 77, 255, 0.3);
      width: 100%;
      max-width: 480px;
      padding: 2rem 1.8rem;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo span {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: inline-block;
      width: 48px;
      height: 48px;
      line-height: 48px;
      border-radius: 24px;
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
    }
    h2 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 1.8rem;
      background: linear-gradient(120deg, #fff, #c4b5fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tab-buttons {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .tab-btn {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: none;
      padding: 0.7rem;
      border-radius: 2rem;
      font-weight: 600;
      color: #b9c3e6;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: linear-gradient(95deg, #4f46e5, #7c3aed);
      color: white;
      box-shadow: 0 4px 12px rgba(79,70,229,0.4);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
      color: #cbd5ff;
    }
    input, select {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(139,92,246,0.4);
      padding: 0.75rem 1rem;
      border-radius: 1.5rem;
      color: white;
      font-family: inherit;
      outline: none;
      transition: 0.2s;
    }
    input:focus, select:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139,92,246,0.3);
    }
    .btn-primary {
      background: linear-gradient(100deg, #4f46e5, #7c3aed);
      border: none;
      width: 100%;
      padding: 0.8rem;
      border-radius: 2rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: 0.2s;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: scale(0.98);
    }
    .error {
      color: #f87171;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      text-align: center;
    }
    .success {
      color: #4ade80;
    }
    .hidden {
      display: none;
    }
    a {
      color: #a78bfa;
      text-decoration: none;
    }
    hr {
      border-color: rgba(139,92,246,0.3);
      margin: 1rem 0;
    }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="logo"><span>Q</span></div>
  <h2>Q‑chat</h2>

  <div class="tab-buttons">
    <button class="tab-btn active" id="loginTab">Login</button>
    <button class="tab-btn" id="registerTab">Create account</button>
  </div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="hello@qchat.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="doLogin">Sign in →</button>
    <div id="loginError" class="error"></div>
  </div>

  <!-- Register Form -->
  <div id="registerForm" class="hidden">
    <div class="form-group">
      <label>Username (unique)</label>
      <input type="text" id="regUsername" placeholder="cosmic_wave">
    </div>
    <div class="form-group">
      <label>Full name</label>
      <input type="text" id="regFullname" placeholder="Alex Nova">
    </div>
    <div class="form-group">
      <label>Date of birth</label>
      <input type="date" id="regDob">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="hello@qchat.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="minimum 6 characters">
    </div>
    <div class="form-group">
      <label>Confirm password</label>
      <input type="password" id="regConfirm">
    </div>
    <button class="btn-primary" id="doRegister">Launch account →</button>
    <div id="regError" class="error"></div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAZk3_MrTsUhmxU3rOz7d3GtruRCf_MKk0",
    authDomain: "q-chat-77ee1.firebaseapp.com",
    databaseURL: "https://q-chat-77ee1-default-rtdb.firebaseio.com",
    projectId: "q-chat-77ee1",
    storageBucket: "q-chat-77ee1.firebasestorage.app",
    messagingSenderId: "916092801511",
    appId: "1:916092801511:web:ee91f171b0a33c99012d42",
    measurementId: "G-8JSL8BZP9J"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // DOM elements
  const loginTab = document.getElementById('loginTab');
  const registerTab = document.getElementById('registerTab');
  const loginDiv = document.getElementById('loginForm');
  const registerDiv = document.getElementById('registerForm');
  const loginBtn = document.getElementById('doLogin');
  const registerBtn = document.getElementById('doRegister');
  const loginError = document.getElementById('loginError');
  const regError = document.getElementById('regError');

  // Toggle forms
  loginTab.addEventListener('click', () => {
    loginTab.classList.add('active');
    registerTab.classList.remove('active');
    loginDiv.classList.remove('hidden');
    registerDiv.classList.add('hidden');
    loginError.innerText = '';
    regError.innerText = '';
  });
  registerTab.addEventListener('click', () => {
    registerTab.classList.add('active');
    loginTab.classList.remove('active');
    registerDiv.classList.remove('hidden');
    loginDiv.classList.add('hidden');
    loginError.innerText = '';
    regError.innerText = '';
  });

  // LOGIN
  loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    loginError.innerText = '';

    if (!email || !password) {
      loginError.innerText = 'Please fill both fields.';
      return;
    }

    try {
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      // Success, redirect to home
      window.location.href = 'home.html';
    } catch (err) {
      console.error(err);
      loginError.innerText = err.message || 'Login failed. Check credentials.';
    }
  });

  // REGISTER
  registerBtn.addEventListener('click', async () => {
    const username = document.getElementById('regUsername').value.trim();
    const fullName = document.getElementById('regFullname').value.trim();
    const dob = document.getElementById('regDob').value;
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    regError.innerText = '';

    if (!username || !fullName || !dob || !email || !password) {
      regError.innerText = 'All fields are required.';
      return;
    }
    if (password !== confirm) {
      regError.innerText = 'Passwords do not match.';
      return;
    }
    if (password.length < 6) {
      regError.innerText = 'Password must be at least 6 characters.';
      return;
    }

    try {
      // Create user in Firebase Auth
      const userCred = await createUserWithEmailAndPassword(auth, email, password);
      const uid = userCred.user.uid;

      // Save extra profile data in Realtime Database
      await set(ref(db, `users/${uid}`), {
        username: username,
        fullName: fullName,
        dob: dob,
        email: email,
        createdAt: Date.now(),
        avatar: username.charAt(0).toUpperCase()
      });

      // Redirect to home page
      window.location.href = 'home.html';
    } catch (err) {
      console.error(err);
      regError.innerText = err.message || 'Registration error. Email may be taken.';
    }
  });
</script>
</body>
</html>
